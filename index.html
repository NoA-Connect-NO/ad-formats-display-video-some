<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Format Reference</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#f0efe9;
  --text:#1a1a18;--text2:#6b6b66;--text3:#9b9b94;
  --border:rgba(26,26,24,0.12);--border2:rgba(26,26,24,0.25);
  --radius-md:8px;--radius-lg:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --safe:#2d7a22;--safe-bg:rgba(45,122,34,0.10);--safe-border:rgba(45,122,34,0.55);
  --caution:#b06000;--caution-bg:rgba(176,96,0,0.10);--caution-border:rgba(176,96,0,0.45);
  --danger:#c0220a;--danger-bg:rgba(192,34,10,0.10);--danger-border:rgba(192,34,10,0.45);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a18;--bg2:#242422;--bg3:#2e2e2b;--text:#f0efe9;--text2:#a0a09a;--text3:#6b6b66;--border:rgba(240,239,233,0.1);--border2:rgba(240,239,233,0.22)}
}
body{font-family:var(--font);background:var(--bg3);color:var(--text);min-height:100vh}
header{background:var(--bg);border-bottom:0.5px solid var(--border2);padding:1.25rem 2rem}
header h1{font-size:18px;font-weight:500;margin-bottom:2px}
header p{font-size:13px;color:var(--text2)}
.main{max-width:1280px;margin:0 auto;padding:1.5rem 1.5rem 4rem}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center}
.tabs{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.tab{padding:6px 13px;border:0.5px solid var(--border2);border-radius:var(--radius-md);font-size:13px;cursor:pointer;background:var(--bg);color:var(--text2);transition:all 0.15s;white-space:nowrap;font-family:var(--font)}
.tab:hover{color:var(--text);border-color:var(--text3)}
.tab.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.search{padding:7px 12px;border:0.5px solid var(--border2);border-radius:var(--radius-md);font-size:13px;background:var(--bg);color:var(--text);font-family:var(--font);min-width:180px}
.search::placeholder{color:var(--text3)}
.search:focus{outline:none;border-color:var(--text3)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.15rem;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s}
.card:hover{border-color:var(--border2);box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.card.profile-card{cursor:default;border-style:dashed}
.card.profile-card:hover{box-shadow:none}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.card-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.3}
.badge{font-size:11px;padding:2px 8px;border-radius:var(--radius-md);white-space:nowrap;flex-shrink:0}
.b-google{background:#E6F1FB;color:#0C447C}.b-youtube{background:#FCEBEB;color:#A32D2D}
.b-facebook{background:#EEEDFE;color:#3C3489}.b-instagram{background:#FAEEDA;color:#633806}
.b-linkedin{background:#E6F1FB;color:#185FA5}.b-tiktok{background:#E1F5EE;color:#085041}
.b-snapchat{background:#FFF9C4;color:#7A6500}.b-responsive{background:#EAF3DE;color:#27500A}
.b-schibsted{background:#FCEBEB;color:#7A1F1F}.b-amedia{background:#FFF3E0;color:#7A4500}
.b-aller{background:#F3E5F5;color:#5E1F7A}.b-dn{background:#E8F5E9;color:#1B5E20}
.b-finansavisen{background:#E3F2FD;color:#0D3C6E}.b-profile{background:#F1EFE8;color:#444441}
.dims{font-size:19px;font-weight:500;color:var(--text);margin-bottom:2px}
.dimunit{font-size:12px;font-weight:400;color:var(--text2)}
.specs-grid{display:grid;grid-template-columns:1fr 1fr;border:0.5px solid var(--border);border-radius:var(--radius-md);overflow:hidden;margin:8px 0}
.specs-grid.single{grid-template-columns:1fr}
.spec-col{padding:8px 10px}
.spec-col+.spec-col{border-left:0.5px solid var(--border)}
.spec-type{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);margin-bottom:4px}
.spec-row{font-size:12px;color:var(--text2);margin-bottom:2px;line-height:1.4}
.spec-val{color:var(--text);font-weight:500}
/* safe zone diagram on card */
.sz-wrap{margin:8px 0}
.sz-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);margin-bottom:5px}
.sz-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:5px}
.sz-li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
.sz-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.sz-dot-safe{background:var(--safe-bg);border:1px solid var(--safe-border)}
.sz-dot-danger{background:var(--danger-bg);border:1px solid var(--danger-border)}
.sz-dot-caution{background:var(--caution-bg);border:1px solid var(--caution-border)}
.note{font-size:11px;color:var(--text2);line-height:1.5;padding:6px 8px;background:var(--bg2);border-radius:var(--radius-md);margin-top:8px}
.no-sz{font-size:11px;color:var(--text3);font-style:italic;margin:4px 0 6px}
.tag-mob{font-size:10px;padding:1px 6px;background:#FAEEDA;color:#633806;border-radius:4px;margin-left:4px;vertical-align:middle}
.tag-desk{font-size:10px;padding:1px 6px;background:#E6F1FB;color:#0C447C;border-radius:4px;margin-left:4px;vertical-align:middle}
.tag-profile{font-size:10px;padding:1px 6px;background:#F1EFE8;color:#444441;border-radius:4px;margin-left:4px;vertical-align:middle}
/* profile cards grid rows */
.profile-rows{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.prow{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;padding:5px 0;border-bottom:0.5px solid var(--border)}
.prow:last-child{border-bottom:none}
.prow-label{color:var(--text2)}
.prow-val{color:var(--text);font-weight:500;text-align:right}
/* section divider */
.section-head{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin:1.5rem 0 0.75rem;padding-bottom:6px;border-bottom:0.5px solid var(--border)}
/* Modal */
.modal-bd{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border2);padding:1.5rem;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
.mclose{float:right;cursor:pointer;font-size:22px;line-height:1;color:var(--text2);background:none;border:none;font-family:var(--font)}
.mclose:hover{color:var(--text)}
.mtitle{font-size:17px;font-weight:500;margin-bottom:3px;color:var(--text)}
.mcat{font-size:13px;color:var(--text2);margin-bottom:1.25rem}
.modal-sz-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px}
.modal-sz-wrap{display:flex;justify-content:center;margin-bottom:10px}
.modal-canvas{position:relative;border-radius:6px;overflow:hidden;border:0.5px solid var(--border2);background:var(--bg2)}
.zone-explanations{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.zone-box{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:var(--radius-md);border:0.5px solid}
.zone-box.safe{background:var(--safe-bg);border-color:var(--safe-border)}
.zone-box.caution{background:var(--caution-bg);border-color:var(--caution-border)}
.zone-box.danger{background:var(--danger-bg);border-color:var(--danger-border)}
.zone-swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0;margin-top:1px}
.zone-swatch.safe{background:var(--safe)}
.zone-swatch.caution{background:var(--caution)}
.zone-swatch.danger{background:var(--danger)}
.zone-tt{font-size:12px;font-weight:500;color:var(--text);margin-bottom:1px}
.zone-td{font-size:11px;color:var(--text2);line-height:1.4}
.mspecs{border:0.5px solid var(--border);border-radius:var(--radius-md);overflow:hidden;margin-bottom:1rem}
.mspec-col{padding:10px 12px}
.mspec-col+.mspec-col{border-top:0.5px solid var(--border)}
.mspec-type{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);margin-bottom:6px}
.mspec-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;gap:8px}
.mspec-l{color:var(--text2)}.mspec-v{color:var(--text);font-weight:500;text-align:right}
.mnote{padding:10px 12px;background:var(--bg2);border-radius:var(--radius-md);font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.src-link{font-size:11px;color:var(--text3)}
.src-link a{color:var(--text3)}
.empty{padding:3rem;text-align:center;color:var(--text2);font-size:14px}
footer{text-align:center;font-size:12px;color:var(--text3);padding:2rem}
</style>
</head>
<body>
<header>
  <h1>Ad format reference</h1>
  <p>Google · YouTube · Facebook · Instagram · LinkedIn · TikTok · Snapchat · Schibsted · Amedia · Aller · DN · Finansavisen — last reviewed April 2026</p>

<div class="main">

    <div class="tabs" id="tabs"></div>

  </div>

</div>
<div id="modal" style="display:none" class="modal-bd">
  <div class="modal" id="mi"></div>
</div>
<footer>Specs change — always verify against official platform and publisher docs before submitting material.</footer>

function deviceTag(d){
  if(!d||d==="All")return"";
  if(d==="Mobile")return`<span class="tag-mob">mobile</span>`;
  if(d==="Desktop"||d==="Desktop/Tablet")return`<span class="tag-desk">desktop</span>`;
  return"";
}

function buildSVG(f,W,H,labelMode){
  if(!f.safe)return null;
  const s=f.safe;
  let tF,bF,sF;
  if(s.pct){tF=s.t/100;bF=s.b/100;sF=s.s/100;}
  else{const fw=f.w||300,fh=f.h||250;tF=s.t/fh;bF=s.b/fh;sF=s.s/fw;}
  const tPx=Math.round(tF*H),bPx=Math.round(bF*H),sPx=Math.round(sF*W);
  const safeH=H-tPx-bPx,safeW=W-sPx*2;
  const fs=labelMode==="modal"?10:8;
  let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block">`;
  svg+=`<rect width="${W}" height="${H}" fill="#dedad2"/>`;
  if(tPx>0)svg+=`<rect x="0" y="0" width="${W}" height="${tPx}" fill="rgba(192,34,10,0.18)"/>`;
  if(bPx>0)svg+=`<rect x="0" y="${H-bPx}" width="${W}" height="${bPx}" fill="rgba(192,34,10,0.18)"/>`;
  if(sPx>0){
    svg+=`<rect x="0" y="${tPx}" width="${sPx}" height="${safeH}" fill="rgba(176,96,0,0.15)"/>`;
    svg+=`<rect x="${W-sPx}" y="${tPx}" width="${sPx}" height="${safeH}" fill="rgba(176,96,0,0.15)"/>`;
  }
  svg+=`<rect x="${sPx}" y="${tPx}" width="${safeW}" height="${safeH}" fill="rgba(45,122,34,0.14)"/>`;
  svg+=`<rect x="${sPx}" y="${tPx}" width="${safeW}" height="${safeH}" fill="none" stroke="rgba(45,122,34,0.65)" stroke-width="1.5" stroke-dasharray="5,3"/>`;
  // labels
  const ff="-apple-system,sans-serif";
  if(labelMode==="card"&&safeH>=12&&safeW>40){
    svg+=`<text x="${W/2}" y="${tPx+safeH/2+fs/3}" text-anchor="middle" font-family="${ff}" font-size="${fs}" fill="rgba(45,122,34,0.95)" font-weight="600">Safe zone</text>`;
  }
  if(labelMode==="modal"){
    if(tPx>=fs+4)svg+=`<text x="${W/2}" y="${tPx/2+fs/3}" text-anchor="middle" font-family="${ff}" font-size="${fs}" fill="rgba(192,34,10,0.9)" font-weight="500">UI overlay — ${s.tL}</text>`;
    if(bPx>=fs+4)svg+=`<text x="${W/2}" y="${H-bPx/2+fs/3}" text-anchor="middle" font-family="${ff}" font-size="${fs}" fill="rgba(192,34,10,0.9)" font-weight="500">UI overlay — ${s.bL}</text>`;
    if(safeH>=fs*3&&safeW>60){
      svg+=`<text x="${W/2}" y="${tPx+safeH/2-fs*0.6}" text-anchor="middle" font-family="${ff}" font-size="${fs+1}" fill="rgba(45,122,34,1)" font-weight="700">✓ Safe zone</text>`;
      svg+=`<text x="${W/2}" y="${tPx+safeH/2+fs*0.9}" text-anchor="middle" font-family="${ff}" font-size="${fs-1}" fill="rgba(45,122,34,0.85)">Logos · Text · CTAs</text>`;
    }
    if(sPx>18&&safeH>40){
      svg+=`<text x="${sPx/2}" y="${H/2}" text-anchor="middle" font-family="${ff}" font-size="${fs-1}" fill="rgba(176,96,0,0.9)" font-weight="500" transform="rotate(-90,${sPx/2},${H/2})">${s.sL}</text>`;
      svg+=`<text x="${W-sPx/2}" y="${H/2}" text-anchor="middle" font-family="${ff}" font-size="${fs-1}" fill="rgba(176,96,0,0.9)" font-weight="500" transform="rotate(90,${W-sPx/2},${H/2})">${s.sL}</text>`;
    }
  }
  svg+=`</svg>`;
  return{svg,tPx,bPx,sPx,safeH,safeW};
}

function scaledDims(f,maxW,maxH){
  if(!f.w||!f.h)return{w:maxW,h:Math.round(maxW*0.55)};
  let w=maxW,h=Math.round(maxW*f.h/f.w);
  if(h>maxH){h=maxH;w=Math.round(maxH*f.w/f.h);}
  return{w,h};
}

function specBlock(f){
  if(!f.still&&!f.video)return"";
  if(f.still&&f.video){
    return`<div class="specs-grid">
      <div class="spec-col"><div class="spec-type">Still</div>
        <div class="spec-row">Format <span class="spec-val">${f.still.fmt}</span></div>
        ${f.still.kb?`<div class="spec-row">Max size <span class="spec-val">${f.still.kb}</span></div>`:""}
      </div>
      <div class="spec-col"><div class="spec-type">Video</div>
        <div class="spec-row">Format <span class="spec-val">${f.video.fmt}</span></div>
        ${f.video.dur?`<div class="spec-row">Duration <span class="spec-val">${f.video.dur}</span></div>`:""}
        ${f.video.kb?`<div class="spec-row">Max size <span class="spec-val">${f.video.kb}</span></div>`:""}
      </div></div>`;
  }
  const s=f.still||f.video,label=f.still?"Still":"Video";
  return`<div class="specs-grid single"><div class="spec-col"><div class="spec-type">${label}</div>
    <div class="spec-row">Format <span class="spec-val">${s.fmt}</span></div>
    ${s.kb?`<div class="spec-row">Max size <span class="spec-val">${s.kb}</span></div>`:""}
    ${s.dur?`<div class="spec-row">Duration <span class="spec-val">${s.dur}</span></div>`:""}
  </div></div>`;
}

function cardHTML(f){
  if(f.isProfile||f.rows){
    const rows=f.rows.map(r=>`<div class="prow"><span class="prow-label">${r.label}</span><span class="prow-val">${r.val}</span></div>`).join("");
    return`<div class="card profile-card">
      <div class="card-header">
        <span class="card-title">${f.name}<span class="tag-profile">${f.isProfile?"profile &amp; branding":"asset specs"}</span></span>
        <span class="badge ${f.badge}">${f.cat}</span>
      </div>
      <div class="profile-rows">${rows}</div>
      <div class="note">${f.note}</div>
    </div>`;
  }
  const dim=f.w&&f.h?`${f.w} × ${f.h}`:"Multiple files";
  const rat=f.ratio?` · ${f.ratio}`:"";
  let szHtml="";
  if(f.safe){
    const{w,h}=scaledDims(f,260,155);
    const d=buildSVG(f,w,h,"card");
    if(d){
      szHtml=`<div class="sz-wrap">
        <div class="sz-label">Safe zones</div>
        <div style="width:${w}px;height:${h}px;border-radius:4px;overflow:hidden;border:0.5px solid var(--border)">${d.svg}</div>
        <div class="sz-legend">
          <div class="sz-li"><div class="sz-dot sz-dot-safe"></div>Safe — logos &amp; text here</div>
          <div class="sz-li"><div class="sz-dot sz-dot-danger"></div>UI overlay — avoid</div>
          ${f.safe.s>0?`<div class="sz-li"><div class="sz-dot sz-dot-caution"></div>Edge caution</div>`:""}
        </div>
      </div>`;
    }
  } else if(f.w){
    szHtml=`<p class="no-sz">No defined safe zone — keep 10px margin on all sides.</p>`;
  }
  return`<div class="card" onclick="openModal(${f.id})">
    <div class="card-header">
      <span class="card-title">${f.name}${deviceTag(f.device)}</span>
      <span class="badge ${f.badge}">${f.cat}</span>
    </div>
    <div class="dims">${dim}<span class="dimunit"> px${rat}</span></div>
    ${specBlock(f)}${szHtml}
    <div class="note">${f.note}</div>
  </div>`;
}

function render(){
  const container=document.getElementById("grid");
  const list=F.filter(f=>{
    const cm=tab==="All"||f.cat===tab;
    const qm=!q||[f.name,f.cat,f.note||"",(f.rows||[]).map(r=>r.label+" "+r.val).join(" ")].some(s=>s.toLowerCase().includes(q));
    return cm&&qm;
  });
  if(!list.length){container.innerHTML=`<div class="grid"><div class="empty">No formats found.</div></div>`;return;}

  // Group: separate profile cards from format cards
  const adCards=list.filter(f=>!f.isProfile&&!f.rows||f.id===20);
  const profCards=list.filter(f=>(f.isProfile||f.rows)&&f.id!==20);

  let html="";
  if(adCards.length){
    html+=`<div class="grid">${adCards.map(cardHTML).join("")}</div>`;
  }
  if(profCards.length){
    html+=`<div class="section-head">Profile &amp; branding specs</div><div class="grid">${profCards.map(cardHTML).join("")}</div>`;
  }
  container.innerHTML=html;
}

function renderTabs(){
  document.getElementById("tabs").innerHTML=CATS.map(c=>
    `<button class="tab${tab===c?" active":""}" onclick="setTab('${c}')">${c}</button>`
  ).join("");
}
function setTab(c){tab=c;renderTabs();render();}
document.getElementById("srch").addEventListener("input",e=>{q=e.target.value.toLowerCase();render();});

function openModal(id){
  const f=F.find(x=>x.id===id);if(!f||(f.isProfile&&!f.rows))return;
  const dim=f.w&&f.h?`${f.w} × ${f.h} px`:"Multiple files — see note";
  const rat=f.ratio||"—";
  let szSection="";
  if(f.safe){
    const{w,h}=scaledDims(f,380,235);
    const d=buildSVG(f,w,h,"modal");
    if(d){
      const fw=f.w||1920,fh=f.h||1080;
      const tA=f.safe.pct?Math.round(fh*f.safe.t/100)+"px":f.safe.tL;
      const bA=f.safe.pct?Math.round(fh*f.safe.b/100)+"px":f.safe.bL;
      const sA=f.safe.pct?Math.round(fw*f.safe.s/100)+"px":f.safe.sL;
      const swA=f.safe.pct?Math.round(fw*(1-2*f.safe.s/100))+"px":(fw-2*f.safe.s)+"px";
      const shA=f.safe.pct?Math.round(fh*(1-f.safe.t/100-f.safe.b/100))+"px":(fh-f.safe.t-f.safe.b)+"px";
      szSection=`<div style="margin-bottom:1.25rem">
        <div class="modal-sz-title">Safe zone diagram — proportional to actual format</div>
        <div class="modal-sz-wrap"><div class="modal-canvas" style="width:${w}px;height:${h}px;border-radius:6px;overflow:hidden">${d.svg}</div></div>
        <div class="zone-explanations">
          <div class="zone-box danger"><div class="zone-swatch danger"></div><div>
            <div class="zone-tt">UI overlay zone — keep clear of logos and text</div>
            <div class="zone-td">Top ${f.safe.tL} (≈${tA}) and bottom ${f.safe.bL} (≈${bA}) are covered by platform UI — buttons, captions, progress bars, CTAs. Anything placed here risks being hidden.</div>
          </div></div>
          <div class="zone-box caution"><div class="zone-swatch caution"></div><div>
            <div class="zone-tt">Side margins — use with caution</div>
            <div class="zone-td">${f.safe.sL} each side (≈${sA}). Backgrounds and non-critical visuals are fine here, but avoid important elements — cropping can occur across device sizes.</div>
          </div></div>
          <div class="zone-box safe"><div class="zone-swatch safe"></div><div>
            <div class="zone-tt">Safe zone — all logos, text and CTAs must sit here</div>
            <div class="zone-td">Approx. ${swA} wide × ${shA} tall. Every element your audience must see — brand logo, headline, call to action — belongs inside this area on all devices.</div>
          </div></div>
        </div>
      </div>`;
    }
  } else {
    szSection=`<p class="no-sz" style="margin-bottom:1rem">No specific safe zone defined. Apply a 10px minimum margin on all sides and avoid placing critical content at the very edges.</p>`;
  }
  let mspecs="";
  if(f.still&&f.video){
    mspecs=`<div class="mspecs">
      <div class="mspec-col"><div class="mspec-type">Still</div>
        <div class="mspec-row"><span class="mspec-l">Format</span><span class="mspec-v">${f.still.fmt}</span></div>
        ${f.still.kb?`<div class="mspec-row"><span class="mspec-l">Max size</span><span class="mspec-v">${f.still.kb}</span></div>`:""}
      </div>
      <div class="mspec-col"><div class="mspec-type">Video</div>
        <div class="mspec-row"><span class="mspec-l">Format</span><span class="mspec-v">${f.video.fmt}</span></div>
        ${f.video.dur?`<div class="mspec-row"><span class="mspec-l">Duration</span><span class="mspec-v">${f.video.dur}</span></div>`:""}
        ${f.video.kb?`<div class="mspec-row"><span class="mspec-l">Max size</span><span class="mspec-v">${f.video.kb}</span></div>`:""}
      </div></div>`;
  } else {
    const s=f.still||f.video,label=f.still?"Still":"Video";
    if(s)mspecs=`<div class="mspecs"><div class="mspec-col"><div class="mspec-type">${label}</div>
      <div class="mspec-row"><span class="mspec-l">Format</span><span class="mspec-v">${s.fmt}</span></div>
      ${s.kb?`<div class="mspec-row"><span class="mspec-l">Max size</span><span class="mspec-v">${s.kb}</span></div>`:""}
      ${s.dur?`<div class="mspec-row"><span class="mspec-l">Duration</span><span class="mspec-v">${s.dur}</span></div>`:""}
    </div></div>`;
  }
  const srcLine=f.src?`<div class="src-link">Source: <a href="${f.src}" target="_blank" rel="noopener">${f.src.replace(/https?:\/\//,"")}</a></div>`:"";
  document.getElementById("mi").innerHTML=`
    <div><button class="mclose" onclick="closeModal()">×</button>
    <p class="mtitle">${f.name}${deviceTag(f.device)}</p>
    <p class="mcat">${f.cat} · ${rat} · ${dim}</p></div>
    ${szSection}${mspecs}
    <div class="mnote">${f.note}</div>${srcLine}`;
  document.getElementById("modal").style.display="flex";
}
function closeModal(){document.getElementById("modal").style.display="none";}
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")closeModal();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
renderTabs();render();
</script>
</body>
</html>
