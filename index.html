<title>Ad Format Reference</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f7f6f3; --bg3: #f0efe9;
    --text: #1a1a18; --text2: #6b6b66; --text3: #9b9b94;
    --border: rgba(26,26,24,0.12); --border2: rgba(26,26,24,0.22);
    --radius-md: 8px; --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --bg2: #242422; --bg3: #2e2e2b;
      --text: #f0efe9; --text2: #a0a09a; --text3: #6b6b66;
      --border: rgba(240,239,233,0.1); --border2: rgba(240,239,233,0.2);
    }
  }
  body { font-family: var(--font); background: var(--bg3); color: var(--text); min-height: 100vh; }
  header { background: var(--bg); border-bottom: 0.5px solid var(--border2); padding: 1.25rem 2rem; display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; }
  header h1 { font-size: 18px; font-weight: 500; }
  header p { font-size: 13px; color: var(--text2); }
  .main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .tab { padding: 6px 13px; border: 0.5px solid var(--border2); border-radius: var(--radius-md); font-size: 13px; cursor: pointer; background: var(--bg); color: var(--text2); transition: all 0.15s; white-space: nowrap; font-family: var(--font); }
  .tab:hover { border-color: var(--text3); color: var(--text); }
  .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .search { padding: 7px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius-md); font-size: 13px; background: var(--bg); color: var(--text); font-family: var(--font); min-width: 180px; }
  .search::placeholder { color: var(--text3); }
  .search:focus { outline: none; border-color: var(--text3); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 12px; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.15rem; cursor: pointer; transition: border-color 0.15s; }
  .card:hover { border-color: var(--border2); }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .card-title { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
  .b-google { background: #E6F1FB; color: #0C447C; }
  .b-youtube { background: #FCEBEB; color: #A32D2D; }
  .b-facebook { background: #EEEDFE; color: #3C3489; }
  .b-instagram { background: #FAEEDA; color: #633806; }
  .b-linkedin { background: #E6F1FB; color: #185FA5; }
  .b-tiktok { background: #E1F5EE; color: #085041; }
  .b-responsive { background: #EAF3DE; color: #27500A; }
  .b-schibsted { background: #FCEBEB; color: #7A1F1F; }
  .b-amedia { background: #FFF3E0; color: #7A4500; }
  .b-aller { background: #F3E5F5; color: #5E1F7A; }
  .b-dn { background: #E8F5E9; color: #1B5E20; }
  .b-finansavisen { background: #E3F2FD; color: #0D3C6E; }

  .dimunit { font-size: 12px; font-weight: 400; color: var(--text2); }
  .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 0.5px solid var(--border); border-radius: var(--radius-md); overflow: hidden; margin: 10px 0; }
  .specs-grid.single { grid-template-columns: 1fr; }
  .spec-col { padding: 8px 10px; }
  .spec-col + .spec-col { border-left: 0.5px solid var(--border); }
  .spec-type { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); margin-bottom: 5px; }
  .spec-row { font-size: 12px; color: var(--text2); margin-bottom: 2px; line-height: 1.4; }
  .spec-val { color: var(--text); font-weight: 500; }
  .safe-row { font-size: 11px; color: var(--text2); margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--border); }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .dsafe { background: #639922; }
  .note { margin-top: 8px; font-size: 11px; color: var(--text2); line-height: 1.5; padding: 6px 8px; background: var(--bg2); border-radius: var(--radius-md); }
  .tag-mob { font-size: 10px; padding: 1px 5px; background: #FAEEDA; color: #633806; border-radius: 4px; margin-left: 5px; vertical-align: middle; }
  .tag-desk { font-size: 10px; padding: 1px 5px; background: #E6F1FB; color: #0C447C; border-radius: 4px; margin-left: 5px; vertical-align: middle; }
  .modal-bd { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border2); padding: 1.5rem; max-width: 480px; width: 100%; max-height: 88vh; overflow-y: auto; }
  .mclose { float: right; cursor: pointer; font-size: 22px; line-height: 1; color: var(--text2); margin-top: -4px; background: none; border: none; font-family: var(--font); }
  .mclose:hover { color: var(--text); }
  .mtitle { font-size: 17px; font-weight: 500; margin-bottom: 3px; color: var(--text); }
  .mcat { font-size: 13px; color: var(--text2); margin-bottom: 1rem; }
  .mvis { display: flex; justify-content: center; margin: 1rem 0 0.5rem; }
  .mcanvas { position: relative; border-radius: 4px; overflow: hidden; background: var(--bg2); border: 0.5px solid var(--border); }
  .mlegend { display: flex; gap: 14px; justify-content: center; font-size: 11px; color: var(--text2); margin-bottom: 1rem; flex-wrap: wrap; }
  .ml-item { display: flex; align-items: center; gap: 4px; }
  .mspecs { border: 0.5px solid var(--border); border-radius: var(--radius-md); overflow: hidden; margin-bottom: 1rem; }
  .mspec-col { padding: 10px 12px; }
  .mspec-col + .mspec-col { border-top: 0.5px solid var(--border); }
  .mspec-type { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); margin-bottom: 6px; }
  .mspec-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px; gap: 8px; }
  .mspec-l { color: var(--text2); }
  .mspec-v { color: var(--text); font-weight: 500; text-align: right; }
  .mnote { padding: 10px 12px; background: var(--bg2); border-radius: var(--radius-md); font-size: 13px; color: var(--text2); line-height: 1.5; }
  .src-link { margin-top: 10px; font-size: 11px; color: var(--text3); }
  .src-link a { color: var(--text3); }
  .empty { padding: 3rem; text-align: center; color: var(--text2); font-size: 14px; }
  footer { text-align: center; font-size: 12px; color: var(--text3); padding: 2rem; }
</style>

const CATS=["All","Google Display","Responsive Display","YouTube","Facebook","Instagram","LinkedIn","TikTok","Schibsted","Amedia","Aller","DN","Finansavisen"];
let tab="All", q="";

function parseSafe(v,total){
  if(!v)return 0;
  return v.endsWith("%")?Math.round(total*parseFloat(v)/100):Math.round(parseFloat(v));
}
function deviceTag(d){
  if(!d||d==="All")return"";
  if(d==="Mobile")return`<span class="tag-mob">mobile</span>`;
  if(d==="Desktop"||d==="Desktop/Tablet")return`<span class="tag-desk">desktop</span>`;
  return"";
}
function specBlock(f){
  if(!f.still&&!f.video)return"";
  if(f.still&&f.video){
    return`<div class="specs-grid">
      <div class="spec-col"><div class="spec-type">Still</div>
        <div class="spec-row">Format <span class="spec-val">${f.still.fmt}</span></div>
        ${f.still.kb?`<div class="spec-row">Max size <span class="spec-val">${f.still.kb}</span></div>`:""}
      </div>
      <div class="spec-col"><div class="spec-type">Video</div>
        <div class="spec-row">Format <span class="spec-val">${f.video.fmt}</span></div>
        ${f.video.dur?`<div class="spec-row">Duration <span class="spec-val">${f.video.dur}</span></div>`:""}
        ${f.video.kb?`<div class="spec-row">Max size <span class="spec-val">${f.video.kb}</span></div>`:""}
      </div></div>`;
  }
  const s=f.still||f.video, label=f.still?"Still":"Video";
  return`<div class="specs-grid single"><div class="spec-col"><div class="spec-type">${label}</div>
    <div class="spec-row">Format <span class="spec-val">${s.fmt}</span></div>
    ${s.kb?`<div class="spec-row">Max size <span class="spec-val">${s.kb}</span></div>`:""}
    ${s.dur?`<div class="spec-row">Duration <span class="spec-val">${s.dur}</span></div>`:""}
  </div></div>`;
}
function cardHTML(f){
  const dim=f.w&&f.h?`${f.w} × ${f.h}`:"Multiple files";
  const rat=f.ratio?` · ${f.ratio}`:"";
  const safeStr=f.safe&&f.safe.t?`<div class="safe-row"><span class="dot dsafe"></span>Safe zone: ${f.safe.t} top · ${f.safe.b} bottom · ${f.safe.s} sides</div>`:"";
  return`<div class="card" onclick="openModal(${f.id})">
    <div class="card-header">
      <span class="card-title">${f.name}${deviceTag(f.device)}</span>
      <span class="badge ${f.badge}">${f.cat}</span>
    </div>
    <div class="dims">${dim}<span class="dimunit"> px${rat}</span></div>
    ${specBlock(f)}${safeStr}
    <div class="note">${f.note}</div>
  </div>`;
}
function render(){
  const g=document.getElementById("grid");
  const list=F.filter(f=>{
    const cm=tab==="All"||f.cat===tab;
    const qm=!q||[f.name,f.cat,f.note||""].some(s=>s.toLowerCase().includes(q));
    return cm&&qm;
  });
  g.innerHTML=list.length?list.map(cardHTML).join(""):`<div class="empty">No formats found.</div>`;
}
function renderTabs(){
  document.getElementById("tabs").innerHTML=CATS.map(c=>
    `<button class="tab${tab===c?" active":""}" onclick="setTab('${c}')">${c}</button>`
  ).join("");
}
function setTab(c){tab=c;renderTabs();render();}
document.getElementById("srch").addEventListener("input",e=>{q=e.target.value.toLowerCase();render();});
function openModal(id){
  const f=F.find(x=>x.id===id); if(!f)return;
  const dim=f.w&&f.h?`${f.w} × ${f.h} px`:"Multiple files — see note";
  const rat=f.ratio||"—";
  let vis="";
  if(f.w&&f.h&&f.safe){
    const mw=260,mh=190;
    let vw=mw,vh=Math.round(mw*f.h/f.w);
    if(vh>mh){vh=mh;vw=Math.round(mh*f.w/f.h);}
    const st=parseSafe(f.safe.t,vh),sb=parseSafe(f.safe.b,vh),ss=parseSafe(f.safe.s,vw);
    vis=`<div class="mvis"><div class="mcanvas" style="width:${vw}px;height:${vh}px">
      <div style="position:absolute;top:0;left:0;right:0;height:${st}px;background:rgba(226,75,74,0.18);border-bottom:1px dashed rgba(226,75,74,0.6)"></div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:${sb}px;background:rgba(226,75,74,0.18);border-top:1px dashed rgba(226,75,74,0.6)"></div>
      <div style="position:absolute;top:0;left:0;bottom:0;width:${ss}px;background:rgba(186,117,23,0.15);border-right:1px dashed rgba(186,117,23,0.5)"></div>
      <div style="position:absolute;top:0;right:0;bottom:0;width:${ss}px;background:rgba(186,117,23,0.15);border-left:1px dashed rgba(186,117,23,0.5)"></div>
      <div style="position:absolute;top:${st}px;left:${ss}px;right:${ss}px;bottom:${sb}px;border:1px dashed rgba(99,153,34,0.7);background:rgba(99,153,34,0.07);display:flex;align-items:center;justify-content:center">
        <span style="font-size:10px;color:rgba(99,153,34,0.9);font-weight:500">safe zone</span>
      </div>
      <div style="position:absolute;bottom:3px;right:5px;font-size:9px;color:#9b9b94">${vw}×${vh} (scaled)</div>
    </div></div>
    <div class="mlegend">
      <span class="ml-item"><span class="dot dsafe" style="display:inline-block"></span>Safe zone</span>
      <span class="ml-item"><span class="dot" style="display:inline-block;background:#BA7517"></span>Caution sides</span>
      <span class="ml-item"><span class="dot" style="display:inline-block;background:#E24B4A"></span>UI overlay risk</span>
    </div>`;
  }
  let mspecs="";
  if(f.still&&f.video){
    mspecs=`<div class="mspecs">
      <div class="mspec-col"><div class="mspec-type">Still</div>
        <div class="mspec-row"><span class="mspec-l">Format</span><span class="mspec-v">${f.still.fmt}</span></div>
        ${f.still.kb?`<div class="mspec-row"><span class="mspec-l">Max size</span><span class="mspec-v">${f.still.kb}</span></div>`:""}
      </div>
      <div class="mspec-col"><div class="mspec-type">Video</div>
        <div class="mspec-row"><span class="mspec-l">Format</span><span class="mspec-v">${f.video.fmt}</span></div>
        ${f.video.dur?`<div class="mspec-row"><span class="mspec-l">Duration</span><span class="mspec-v">${f.video.dur}</span></div>`:""}
        ${f.video.kb?`<div class="mspec-row"><span class="mspec-l">Max size</span><span class="mspec-v">${f.video.kb}</span></div>`:""}
      </div></div>`;
  } else {
    const s=f.still||f.video,label=f.still?"Still":"Video";
    if(s)mspecs=`<div class="mspecs"><div class="mspec-col"><div class="mspec-type">${label}</div>
      <div class="mspec-row"><span class="mspec-l">Format</span><span class="mspec-v">${s.fmt}</span></div>
      ${s.kb?`<div class="mspec-row"><span class="mspec-l">Max size</span><span class="mspec-v">${s.kb}</span></div>`:""}
      ${s.dur?`<div class="mspec-row"><span class="mspec-l">Duration</span><span class="mspec-v">${s.dur}</span></div>`:""}
    </div></div>`;
  }
  const srcLine=f.src?`<div class="src-link">Source: <a href="${f.src}" target="_blank" rel="noopener">${f.src.replace(/https?:\/\//,"")}</a></div>`:"";
  document.getElementById("mi").innerHTML=`
    <div><button class="mclose" onclick="closeModal()">×</button>
    <p class="mtitle">${f.name}${deviceTag(f.device)}</p>
    <p class="mcat">${f.cat} · ${rat} · ${dim}</p></div>
    ${vis}${mspecs}
    <div class="mnote">${f.note}</div>${srcLine}`;
  document.getElementById("modal").style.display="flex";
}
function closeModal(){document.getElementById("modal").style.display="none";}
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")closeModal();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
renderTabs();render();
</script>
